name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s
          command_timeout: 45m
          script: |
            set -e
            cd ~/khamadi-online

            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "📥 Installing dependencies..."
            npm ci --prefer-offline || npm install

            echo "🔨 Building..."
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm run build

            echo "🚀 Restarting pm2..."
            pm2 stop khamadi 2>/dev/null || true
            pm2 delete khamadi 2>/dev/null || true

            NODE_OPTIONS="--max-old-space-size=2048" pm2 start npm \
              --name khamadi \
              --max-memory-restart 1800M \
              -- start

            pm2 save
            sleep 5
            pm2 list
            curl -sf http://localhost:3000 > /dev/null && echo "✅ App responding" || echo "⚠️ Not responding on :3000"
            echo "✅ Deploy done at $(date)"
